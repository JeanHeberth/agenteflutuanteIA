spring:
  application:
    name: agenteflutuanteia
  data:
    mongodb:
      uri: "${MONGODB_URI}${MONGODB_NAME}"

server:
  port: "${SERVER_PORT:8089}"

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: INFO

gemini:
  api-key: "${GEMINI_API_KEY:}"
  model: "gemini-2.5-flash"
  api-url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"

chat:
  system-prompt: "Você é um assistente inteligente e prestativo. Responda de forma clara, objetiva e em português."
