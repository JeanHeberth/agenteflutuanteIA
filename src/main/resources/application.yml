spring:
  application:
    name: agenteflutuanteia


  data:
    mongodb:
      uri: "${MONGO_URI_NUVEM}/agenteflutuanteia?retryWrites=true&w=majority"


server:
  port: "9098"

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: INFO

gemini:
  api-key: "${GEMINI_API_KEY:}"
  model: "gemini-2.5-flash-lite"
  api-url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent"

chat:
  system-prompt: "Você é um assistente inteligente e prestativo. Responda de forma clara, objetiva e em português."
